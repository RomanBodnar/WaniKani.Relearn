name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version (e.g. v1.0.0)"
        required: true

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west1
  REPOSITORY: wanikani-relearn
  IMAGE_NAME: wanikanirelearn

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: # Required if using Workload Identity Federation
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # Format: projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/POOL_ID/providers/PROVIDER_ID
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER_ID }}
          service_account: 'github-actions-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com'
          token_format: 'access_token'

      - name: Docker Auth
        uses: 'docker/login-action@v3'
        with:
          # Use the automatic "access_token" from the auth step
          username: 'oauth2accesstoken'
          password: '${{ steps.auth.outputs.access_token }}'
          registry: '${{ env.REGION }}-docker.pkg.dev'

      # Set up Buildx for advanced caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./WaniKani.Relearn
          file: ./WaniKani.Relearn/Dockerfile
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.version }}
          # This caches layers in the GitHub Actions runner to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max